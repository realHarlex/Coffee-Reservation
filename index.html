<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☕ Coffee Réservation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand">☕ Coffee <span class="accent">Réservation</span></span>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row g-4">

      <!-- FORMULAIRE -->
      <div class="col-md-5">
        <div class="card">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0" id="formTitle">Nouvelle Réservation</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label">Nom Complet</label>
              <input type="text" class="form-control" id="nom" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required>
            </div>
            <div class="row g-2 mb-3">
              <div class="col">
                <label class="form-label">Date</label>
                <input type="date" class="form-control" id="date" required>
              </div>
              <div class="col">
                <label class="form-label">Heure</label>
                <input type="time" class="form-control" id="heure" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Nombre de Personnes</label>
              <select class="form-select" id="personnes" required>
                <option value="">Choisir...</option>
                <option value="1">1 personne</option>
                <option value="2">2 personnes</option>
                <option value="3">3 personnes</option>
                <option value="4">4 personnes</option>
                <option value="5">5+ personnes</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">🛒 Demande Spéciale — Menu</label>
              <div class="menu-grid" id="menuGrid">

                <div class="menu-category">
                  <div class="menu-cat-title">☕ Cafés</div>
                  <label class="menu-item"><input type="checkbox" value="Espresso"> Espresso <span class="menu-price">1.50€</span></label>
                  <label class="menu-item"><input type="checkbox" value="Cappuccino"> Cappuccino <span class="menu-price">2.50€</span></label>
                  <label class="menu-item"><input type="checkbox" value="Latte"> Latte <span class="menu-price">3.00€</span></label>
                  <label class="menu-item"><input type="checkbox" value="Americano"> Americano <span class="menu-price">2.00€</span></label>
                </div>

                <div class="menu-category">
                  <div class="menu-cat-title">🧁 Pâtisseries</div>
                  <label class="menu-item"><input type="checkbox" value="Croissant"> Croissant <span class="menu-price">1.80€</span></label>
                  <label class="menu-item"><input type="checkbox" value="Muffin"> Muffin <span class="menu-price">2.20€</span></label>
                  <label class="menu-item"><input type="checkbox" value="Cheesecake"> Cheesecake <span class="menu-price">4.50€</span></label>
                  <label class="menu-item"><input type="checkbox" value="Brownie"> Brownie <span class="menu-price">2.80€</span></label>
                </div>

                <div class="menu-category">
                  <div class="menu-cat-title">🥤 Boissons Froides</div>
                  <label class="menu-item"><input type="checkbox" value="Iced Latte"> Iced Latte <span class="menu-price">3.50€</span></label>
                  <label class="menu-item"><input type="checkbox" value="Smoothie"> Smoothie <span class="menu-price">4.00€</span></label>
                  <label class="menu-item"><input type="checkbox" value="Limonade"> Limonade <span class="menu-price">2.50€</span></label>
                </div>

                <div class="menu-category">
                  <div class="menu-cat-title">🥪 Sandwichs</div>
                  <label class="menu-item"><input type="checkbox" value="Club Sandwich"> Club Sandwich <span class="menu-price">5.50€</span></label>
                  <label class="menu-item"><input type="checkbox" value="Panini"> Panini <span class="menu-price">4.80€</span></label>
                  <label class="menu-item"><input type="checkbox" value="Wrap"> Wrap <span class="menu-price">4.50€</span></label>
                </div>

              </div>
              <div class="menu-summary" id="menuSummary">Aucun produit sélectionné</div>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-primary flex-grow-1" onclick="saveReservation()">
                <i class="bi bi-check-lg"></i> <span id="submitLabel">Réserver</span>
              </button>
              <button class="btn btn-outline-secondary d-none" id="cancelBtn" onclick="cancelEdit()">
                <i class="bi bi-x-lg"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- LISTE -->
      <div class="col-md-7">
        <div class="card">
          <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Liste des Réservations</h5>
            <span class="badge bg-light text-dark" id="countBadge">0</span>
          </div>
          <div class="card-body">
            <input type="text" class="form-control mb-3" id="search"
              placeholder="🔍 Rechercher..." oninput="render()">
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Nom / Email</th>
                    <th>Date &amp; Heure</th>
                    <th>👥</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="tbody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL SUPPRESSION -->
  <div class="modal fade" id="delModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h6 class="modal-title">Supprimer ?</h6>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-muted small">Cette action est irréversible.</div>
        <div class="modal-footer">
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Annuler</button>
          <button class="btn btn-danger btn-sm" onclick="confirmDelete()">Supprimer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toast" class="toast align-items-center border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body fw-semibold" id="toastMsg"></div>
        <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
